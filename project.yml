name: WhisperBar
options:
  bundleIdPrefix: com.kyleqi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

targets:
  WhisperBar:
    type: application
    platform: macOS
    sources:
      - path: WhisperBar
        excludes:
          - "Models/**"
      - path: WhisperBar/Models
        type: folder
    info:
      path: WhisperBar/Info.plist
      properties:
        CFBundleName: WhisperBar
        CFBundleDisplayName: WhisperBar
        CFBundleIdentifier: com.kyleqi.WhisperBar
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSPrincipalClass: NSApplication
        NSMicrophoneUsageDescription: "WhisperBar 需要麦克风权限以录制语音"
        LSUIElement: true
    entitlements:
      path: WhisperBar/WhisperBar.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kyleqi.WhisperBar
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_NAME: WhisperBar
    dependencies:
      - package: WhisperKit
        product: WhisperKit
